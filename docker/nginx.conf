events {}

http {
  upstream shell_next {
    server host.docker.internal:3000;
  }

  upstream shop_next_zone {
    server host.docker.internal:3001;
  }

  upstream dashboard_next_zone {
    server host.docker.internal:3002;
  }

  server {
    listen 8080;

    location /shop/ {
      proxy_pass http://shop_next_zone;
      proxy_set_header Host $host;
    }

    location /dashboard/ {
      proxy_pass http://dashboard_next_zone;
      proxy_set_header Host $host;
    }

    location / {
      proxy_pass http://shell_next;
      proxy_set_header Host $host;
    }
  }
}
